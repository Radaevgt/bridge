services:
  postgres:
    image: postgres:15
    container_name: bridge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bridge
    ports:
      - "5433:5432"
    volumes:
      - bridge-pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: bridge-redis
    restart: unless-stopped
    ports:
      - "6380:6379"

volumes:
  bridge-pgdata:
